name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    name: Contracts Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        # package-lock.json is generated on Windows; npm ci is too strict to
        # install platform-specific optional bindings (e.g. rolldown) on Linux.
        # npm install with a lock file present still uses it for version resolution.
        run: npm install

      - name: Build shared contracts
        run: npm run build:contracts

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Typecheck backend
        run: npm run typecheck:backend

      - name: Run backend tests
        run: npm run test:backend

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    needs: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run frontend tests
        run: npm run test:frontend
